  const { error } = await sb.from("tracker_state").upsert({ key, value });

async function uploadExpertFile(expertId, file) {

function fmtDate(d) { const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, "0"); const dd = String(d.getDate()).padStart(2, "0"); return y + "-" + m + "-" + dd; }
function getCurrentPhase(dateStr) { for (const p of PHASES) if (dateStr >= p.start && dateStr <= p.end) return p; return null; }
function isPowerWeek(dateStr) { return POWER_WEEKS.some(pw => dateStr >= pw.start && dateStr <= pw.end); }
function isHolidayDate(dateStr) { return HOLIDAYS.some(h => dateStr >= h.start && dateStr <= h.end); }
function getDayInfo(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const dow = d.getDay();
  const dayName = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][dow];
  const isWeekend = dow === 0 || dow === 6;
  const power = isPowerWeek(dateStr);
  const holiday = isHolidayDate(dateStr);
  let hours = 0;
  if (!isWeekend && !holiday) {
    if (dow === 3) hours = 0;
    else if (power && dow === 4) hours = 4;
    else if (power && dow === 5) hours = 7;
    else hours = 1.5;
  }
  return { dayName, dow, isWeekend, isPowerWeek: power, isHoliday: holiday, hours };
}

function getTodaysObjective(dateStr) {
  const phase = getCurrentPhase(dateStr);

  if (!phase) {
    if (dateStr > PROJECT_END) return { phase: null, title: "Project delivered — well done.", subtitle: "", hours: 0, day };
    const next = PHASES.find(p => p.start > dateStr);
    if (next) return { phase: next, title: "Phase " + next.id + " starts " + next.start, subtitle: next.name + ": " + next.focus, hours: 0, day };
    return { phase: null, title: "Outside project timeline", subtitle: "", hours: 0, day };
  }
  if (day.isHoliday) return { phase, title: "School break — rest", subtitle: HOLIDAYS.find(h => dateStr >= h.start && dateStr <= h.end).name, hours: 0, day };
  if (day.isWeekend) return { phase, title: "Weekend — rest", subtitle: "Reset for the week ahead.", hours: 0, day };
  if (day.dow === 3) return { phase, title: "Wednesday — no Impact Project session", subtitle: "Use the day for school / recovery.", hours: 0, day };
  let title, subtitle;
  if (day.isPowerWeek && day.dow === 5) { title = "POWER FRIDAY — " + phase.name; subtitle = "Full day. Aim to ship a complete deliverable: " + phase.focus; }
  else if (day.isPowerWeek && day.dow === 4) { title = "POWER THURSDAY (half day) — " + phase.name; subtitle = "Deep work block on: " + phase.focus; }
  else { title = (DAY_FOCUS[day.dow] || "Session") + " — " + phase.name; subtitle = phase.focus; }
  return { phase, title, subtitle, hours: day.hours, day };
}
function getThisWeekDays(refDate) {
  const d = new Date(refDate + "T00:00:00");
  const dow = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((dow + 6) % 7));
  const out = [];
  for (let i = 0; i < 5; i++) {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    out.push(fmtDate(dt));
  }
  return out;
}

                <div className="field"><label className="field-label">Meeting link</label><input className="field-input" value={editingExpert.meetingLink||""} onChange={ev => setEditingExpert({ ...editingExpert, meetingLink: ev.target.value })} placeholder="Zoom / Teams / Meet URL" /></div>
              </div>
              <div className="field"><label className="field-label">Meeting notes</label><textarea className="field-textarea" rows={5} value={editingExpert.notes||""} onChange={ev => setEditingExpert({ ...editingExpert, notes: ev.target.value })} placeholder="Key points, action items, follow-ups..." /></div>
              <div className="field">
                <label className="field-label">Attachments (audio recordings, notes, photos)</label>
                {(editingExpert.attachments||[]).map((att, i) => (
                  <div key={i} className="attachment-row">
                    <span style={{ fontSize: 18 }}>{att.type && att.type.startsWith("audio") ? "🎧" : att.type && att.type.startsWith("image") ? "🖼️" : "📄"}</span>
                    <a href={att.url} target="_blank" rel="noopener" style={{ flex: 1 }}>{att.name}</a>
                    <button className="tpl-btn" onClick={async () => { if (att.path) await deleteExpertFile(att.path); setEditingExpert({ ...editingExpert, attachments: (editingExpert.attachments||[]).filter((_, j) => j !== i) }); }}>Remove</button>
                  </div>
                ))}
                <input type="file" accept="audio/*,image/*,application/pdf,.txt,.md,.doc,.docx" multiple onChange={async ev => {
                  const files = Array.from(ev.target.files || []);
                  if (!files.length) return;
                  const expertId = editingExpert.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
                  setUploading(true);
                  const newAtts = [];
                  for (const f of files) {
                    const r = await uploadExpertFile(expertId, f);
                    if (r) newAtts.push(r);
                  }
                  setUploading(false);
                  setEditingExpert(prev => ({ ...prev, id: expertId, attachments: [...(prev.attachments||[]), ...newAtts] }));
                  ev.target.value = "";
                }} style={{ fontSize: 12, marginTop: 6 }} />
                {uploading && <div style={{ fontSize: 11, color: "#6366f1", marginTop: 6 }}>Uploading…</div>}
              </div>
            </div>
            <div className="modal-foot">
              {editingExpert.id && (<button className="btn btn-outline" style={{ marginRight: "auto", color: "#dc2626", borderColor: "#fecaca" }} onClick={async () => { if (confirm("Delete this expert and all attachments?")) { await deleteExpertById(editingExpert.id); setEditingExpert(null); setOpenExpert(null); } }}>Delete</button>)}
              <button className="btn btn-outline" onClick={() => setEditingExpert(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={async () => { const saved = await saveExpert(editingExpert); setEditingExpert(null); setOpenExpert(saved); }}>Save</button>
            </div>
          </div>
        </div>
      )}
      {active && (
        <div className="panel">
          <div className="panel-header">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>§{active.section.id} · {active.section.title}</div>
                <div style={{ fontWeight: 700, fontSize: 14, lineHeight: 1.4 }}>{active.item.text}</div>
              </div>
              <button onClick={closePanel} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 22, cursor: "pointer", lineHeight: 1, flexShrink: 0, marginTop: 2 }}>\u00d7</button>
            </div>
            <div style={{ marginTop: 8 }}>
              <span className={`chip ${TYPE[active.item.type].chip}`}>{TYPE[active.item.type].label}</span>
            </div>
          </div>
          <div className="panel-body">
            <div className="desc-box">
              <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>What this needs to cover</div>
              <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{active.item.description}</p>
            </div>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Answer these \u2014 then copy for Claude</div>
            {active.item.questions.map((q, i) => (
              <div key={i} style={{ marginBottom: 16 }}>
                <div className="q-label">
                  <span className="q-num">{i + 1}</span>
                  <span>{q}</span>
                </div>
                <textarea className="answer" rows={3}
                  value={getAns(active.section.id, active.item.text, i)}
                  onChange={e => setAns(active.section.id, active.item.text, i, e.target.value)}
                  placeholder="Type your answer here..." />
              </div>
            ))}
          </div>
          <div className="panel-footer">
            <button className={`btn ${copied ? "btn-success" : "btn-primary"}`} style={{ width: "100%" }} onClick={copyForClaude}>
              {copied ? "\u2713 Copied \u2014 paste it into the chat!" : "\u{1F4CB} Copy Q&A for Claude"}
            </button>
            <button className="btn btn-outline" style={{ width: "100%" }}
              onClick={() => toggleCheck(active.section.id, active.item.text)}>
              {checked[key(active.section.id, active.item.text)] ? "\u2713 Marked as complete" : "Mark as complete"}
            </button>
            <p style={{ fontSize: 11, color: "#9ca3af", textAlign: "center" }}>
              Fill in your answers, copy, then paste into the chat for Claude to generate the content.
            </p>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
