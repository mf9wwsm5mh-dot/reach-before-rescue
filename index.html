function fmtDate(d) { const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, "0"); const dd = String(d.getDate()).padStart(2, "0"); return y + "-" + m + "-" + dd; }
function getCurrentPhase(dateStr) { for (const p of PHASES) if (dateStr >= p.start && dateStr <= p.end) return p; return null; }
function isPowerWeek(dateStr) { return POWER_WEEKS.some(pw => dateStr >= pw.start && dateStr <= pw.end); }
function isHolidayDate(dateStr) { return HOLIDAYS.some(h => dateStr >= h.start && dateStr <= h.end); }
function getDayInfo(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const dow = d.getDay();
  const dayName = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][dow];
  const isWeekend = dow === 0 || dow === 6;
  const power = isPowerWeek(dateStr);
  const holiday = isHolidayDate(dateStr);
  let hours = 0;
  if (!isWeekend && !holiday) {
    if (dow === 3) hours = 0;
    else if (power && dow === 4) hours = 4;
    else if (power && dow === 5) hours = 7;
    else hours = 1.5;
  }
  return { dayName, dow, isWeekend, isPowerWeek: power, isHoliday: holiday, hours };
}
const DAY_FOCUS = {

function getTodaysObjective(dateStr) {
  const phase = getCurrentPhase(dateStr);
  const day = getDayInfo(dateStr);
  if (!phase) {
    if (dateStr > PROJECT_END) return { phase: null, title: "Project delivered — well done.", subtitle: "", hours: 0, day };
    const next = PHASES.find(p => p.start > dateStr);
    if (next) return { phase: next, title: "Phase " + next.id + " starts " + next.start, subtitle: next.name + ": " + next.focus, hours: 0, day };
    return { phase: null, title: "Outside project timeline", subtitle: "", hours: 0, day };
  }
  if (day.isHoliday) return { phase, title: "School break — rest", subtitle: HOLIDAYS.find(h => dateStr >= h.start && dateStr <= h.end).name, hours: 0, day };
  if (day.isWeekend) return { phase, title: "Weekend — rest", subtitle: "Reset for the week ahead.", hours: 0, day };
  if (day.dow === 3) return { phase, title: "Wednesday — no Impact Project session", subtitle: "Use the day for school / recovery.", hours: 0, day };
  let title, subtitle;
  if (day.isPowerWeek && day.dow === 5) { title = "POWER FRIDAY — " + phase.name; subtitle = "Full day. Aim to ship a complete deliverable: " + phase.focus; }

  else { title = (DAY_FOCUS[day.dow] || "Session") + " — " + phase.name; subtitle = phase.focus; }
  return { phase, title, subtitle, hours: day.hours, day };
}
function getThisWeekDays(refDate) {
  const d = new Date(refDate + "T00:00:00");
  const dow = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((dow + 6) % 7));
  const out = [];
  for (let i = 0; i < 5; i++) {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    out.push(fmtDate(dt));
  }
  return out;
}

            </div>
            <div className="modal-foot">
              {editingCriterion.id && (<button className="btn btn-outline" style={{ marginRight: "auto", color: "#dc2626", borderColor: "#fecaca" }} onClick={async () => { if (confirm("Delete this criterion?")) { await deleteCriterionById(editingCriterion.id); setEditingCriterion(null); } }}>Delete</button>)}
              <button className="btn btn-outline" onClick={() => setEditingCriterion(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={async () => { await saveCriterion(editingCriterion); setEditingCriterion(null); }}>Save</button>
            </div>
          </div>
        </div>
      )}
      {openDay && (() => {
        const obj = getTodaysObjective(openDay);
        const reflectionText = reflections[openDay] || "";
        return (
          <div className="modal-backdrop" onClick={() => { if (recording) stopRecording(); setOpenDay(null); }}>
            <div className="modal" onClick={ev => ev.stopPropagation()}>
              <div className="modal-head">
                <div style={{ minWidth: 0 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 800, color: "#111827" }}>{obj.day.dayName}, {openDay}</h3>
                  <div style={{ fontSize: 12, color: "#4b5563", marginTop: 2 }}>{obj.title}</div>
                </div>
                <button onClick={() => { if (recording) stopRecording(); setOpenDay(null); }} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 22, cursor: "pointer", lineHeight: 1 }}>×</button>
              </div>
              <div className="modal-body">
                {obj.subtitle && (<div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: 12, fontSize: 13, color: "#374151", marginBottom: 14, lineHeight: 1.5 }}><div style={{ fontSize: 10, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Focus</div>{obj.subtitle}</div>)}
                <div className="field"><label className="field-label">Reflection</label>
                  <div className="voice-rec">
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                      <button className={"voice-btn " + (recording ? "recording" : "idle")} onClick={() => recording ? stopRecording() : startRecording()}>
                        {recording ? "■ Stop" : "🎤 Record reflection"}
                      </button>
                      <span style={{ fontSize: 11, color: "#6b7280" }}>{recording ? "Listening… speak naturally" : "Browser-based transcription. Click to start."}</span>
                    </div>
                    {(reflectionText || interimText) && (
                      <div className="voice-transcript">
                        {reflectionText}
                        {interimText && <span className="voice-interim">{(reflectionText ? " " : "") + interimText}</span>}
                      </div>
                    )}
                  </div>
                  <textarea className="field-textarea" rows={5} value={reflectionText} onChange={ev => saveReflection(openDay, ev.target.value)} placeholder="Or type directly… What worked, what didn't, what's next?" style={{ marginTop: 10 }} />
                </div>
              </div>
              <div className="modal-foot">
                {reflectionText && (<button className="btn btn-outline" style={{ marginRight: "auto" }} onClick={() => { const prompt = "Please synthesise this daily reflection from " + openDay + " into a polished, structured paragraph (what was achieved / what blocked progress / next steps):\n\n" + reflectionText; navigator.clipboard.writeText(prompt); alert("Copied to clipboard. Paste into Claude chat for synthesis."); }}>📋 Copy for Claude synthesis</button>)}
                <button className="btn btn-primary" onClick={() => { if (recording) stopRecording(); setOpenDay(null); }}>Done</button>
              </div>
            </div>
          </div>
        );
      })()}
      {openExpert && !editingExpert && (
        <div className="modal-backdrop" onClick={() => setOpenExpert(null)}>
          <div className="modal" onClick={ev => ev.stopPropagation()}>
            <div className="modal-head">
              <div style={{ minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <h3 style={{ fontSize: 18, fontWeight: 800, color: "#111827" }}>{openExpert.name}</h3>
                  <span className={"status-pill-mini status-" + (openExpert.status||"to_contact")}>{(openExpert.status||"to_contact").replace(/_/g, " ")}</span>
                </div>
                <div style={{ fontSize: 12, color: "#4b5563", marginTop: 2 }}>{openExpert.role}{openExpert.organization && (" · " + openExpert.organization)}</div>
              </div>
              <button onClick={() => setOpenExpert(null)} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 22, cursor: "pointer", lineHeight: 1, flexShrink: 0 }}>×</button>
            </div>
            <div className="modal-body">
              {openExpert.description && (
                <div className="field">
                  <span className="field-label">Description</span>
                  <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{openExpert.description}</p>
                </div>
              )}
              {openExpert.purpose && (
                <div className="field">
                  <span className="field-label">Purpose / what we want from them</span>
                  <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{openExpert.purpose}</p>
                </div>
              )}
              <div className="field-grid-2">
                {openExpert.email && (<div className="field"><span className="field-label">Email</span><a href={"mailto:" + openExpert.email} style={{ fontSize: 13, color: "#4338ca" }}>{openExpert.email}</a></div>)}
                {openExpert.phone && (<div className="field"><span className="field-label">Phone</span><span style={{ fontSize: 13, color: "#374151" }}>{openExpert.phone}</span></div>)}
                {openExpert.meetingDate && (<div className="field"><span className="field-label">Meeting date</span><span style={{ fontSize: 13, color: "#374151" }}>{openExpert.meetingDate}</span></div>)}
                {openExpert.meetingLink && (<div className="field"><span className="field-label">Meeting link</span><a href={openExpert.meetingLink} target="_blank" rel="noopener" style={{ fontSize: 13, color: "#4338ca" }}>{openExpert.meetingLink}</a></div>)}
              </div>
              {openExpert.notes && (
                <div className="field">
                  <span className="field-label">Meeting notes</span>
                  <div style={{ fontSize: 13, color: "#374151", whiteSpace: "pre-wrap", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: 12, lineHeight: 1.5 }}>{openExpert.notes}</div>
                </div>
              )}
              {openExpert.attachments && openExpert.attachments.length > 0 && (
                <div className="field">
                  <span className="field-label">Attachments</span>
                  {openExpert.attachments.map((att, i) => (
                    <div key={i} className="attachment-row">
                      <span style={{ fontSize: 18 }}>{att.type && att.type.startsWith("audio") ? "🎧" : att.type && att.type.startsWith("image") ? "🖼️" : "📄"}</span>
                      <a href={att.url} target="_blank" rel="noopener" style={{ flex: 1 }}>{att.name}</a>
                      <span style={{ color: "#9ca3af", fontSize: 11 }}>{Math.round((att.size||0)/1024)} KB</span>
                    </div>
                  ))}
                </div>
              )}
              <div className="field">
                <span className="field-label">Email templates — click to copy</span>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {EMAIL_TEMPLATES.map(t => (
                    <button key={t.id} className="tpl-btn" onClick={() => { const txt = "Subject: " + t.subject + "\n\n" + t.body(openExpert); navigator.clipboard.writeText(txt); setEmailTemplate(t.id); setTimeout(() => setEmailTemplate(null), 2000); }}>{emailTemplate === t.id ? "✓ Copied " + t.label : t.label}</button>
                  ))}
                </div>
              </div>
            </div>
            <div className="modal-foot">
              {openExpert.email && <a className="btn btn-outline" href={"mailto:" + openExpert.email} style={{ textDecoration: "none" }}>✉️ Email</a>}
              {openExpert.meetingLink && <a className="btn btn-outline" href={openExpert.meetingLink} target="_blank" rel="noopener" style={{ textDecoration: "none" }}>🔗 Meeting</a>}
              <button className="btn btn-outline" onClick={() => { setEditingExpert({ ...openExpert }); }}>✏️ Edit</button>
              <button className="btn btn-primary" onClick={() => setOpenExpert(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
      {editingExpert && (
        <div className="modal-backdrop" onClick={() => setEditingExpert(null)}>
          <div className="modal" onClick={ev => ev.stopPropagation()}>
            <div className="modal-head">
              <h3 style={{ fontSize: 16, fontWeight: 800, color: "#111827" }}>{editingExpert.id ? "Edit expert" : "Add expert"}</h3>
              <button onClick={() => setEditingExpert(null)} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 22, cursor: "pointer", lineHeight: 1 }}>×</button>
            </div>
            <div className="modal-body">
              <div className="field-grid-2">
                <div className="field"><label className="field-label">Name</label><input className="field-input" value={editingExpert.name||""} onChange={ev => setEditingExpert({ ...editingExpert, name: ev.target.value })} placeholder="Full name" /></div>
                <div className="field"><label className="field-label">Status</label><select className="field-select" value={editingExpert.status||"to_contact"} onChange={ev => setEditingExpert({ ...editingExpert, status: ev.target.value })}><option value="to_contact">To contact</option><option value="outreach_sent">Outreach sent</option><option value="scheduled">Scheduled</option><option value="met">Met</option><option value="follow_up">Follow up</option></select></div>
              </div>
              <div className="field-grid-2">
                <div className="field"><label className="field-label">Role / title</label><input className="field-input" value={editingExpert.role||""} onChange={ev => setEditingExpert({ ...editingExpert, role: ev.target.value })} placeholder="e.g. Chief Development Officer" /></div>
                <div className="field"><label className="field-label">Organisation</label><input className="field-input" value={editingExpert.organization||""} onChange={ev => setEditingExpert({ ...editingExpert, organization: ev.target.value })} placeholder="e.g. NZ LandSAR" /></div>
              </div>
              <div className="field"><label className="field-label">Description — who they are</label><textarea className="field-textarea" rows={3} value={editingExpert.description||""} onChange={ev => setEditingExpert({ ...editingExpert, description: ev.target.value })} placeholder="A few sentences on their role and authority." /></div>
              <div className="field"><label className="field-label">Purpose — what we want from them</label><textarea className="field-textarea" rows={3} value={editingExpert.purpose||""} onChange={ev => setEditingExpert({ ...editingExpert, purpose: ev.target.value })} placeholder="Why we want to talk to them; what we hope to learn or secure." /></div>
              <div className="field-grid-2">
                <div className="field"><label className="field-label">Email</label><input className="field-input" type="email" value={editingExpert.email||""} onChange={ev => setEditingExpert({ ...editingExpert, email: ev.target.value })} placeholder="email@example.com" /></div>
                <div className="field"><label className="field-label">Phone</label><input className="field-input" value={editingExpert.phone||""} onChange={ev => setEditingExpert({ ...editingExpert, phone: ev.target.value })} placeholder="+64 ..." /></div>
              </div>
              <div className="field-grid-2">
                <div className="field"><label className="field-label">Meeting date</label><input className="field-input" type="date" value={editingExpert.meetingDate||""} onChange={ev => setEditingExpert({ ...editingExpert, meetingDate: ev.target.value })} /></div>
                <div className="field"><label className="field-label">Meeting link</label><input className="field-input" value={editingExpert.meetingLink||""} onChange={ev => setEditingExpert({ ...editingExpert, meetingLink: ev.target.value })} placeholder="Zoom / Teams / Meet URL" /></div>
              </div>
              <div className="field"><label className="field-label">Meeting notes</label><textarea className="field-textarea" rows={5} value={editingExpert.notes||""} onChange={ev => setEditingExpert({ ...editingExpert, notes: ev.target.value })} placeholder="Key points, action items, follow-ups..." /></div>
              <div className="field">
                <label className="field-label">Attachments (audio recordings, notes, photos)</label>
                {(editingExpert.attachments||[]).map((att, i) => (
                  <div key={i} className="attachment-row">
                    <span style={{ fontSize: 18 }}>{att.type && att.type.startsWith("audio") ? "🎧" : att.type && att.type.startsWith("image") ? "🖼️" : "📄"}</span>
                    <a href={att.url} target="_blank" rel="noopener" style={{ flex: 1 }}>{att.name}</a>
                    <button className="tpl-btn" onClick={async () => { if (att.path) await deleteExpertFile(att.path); setEditingExpert({ ...editingExpert, attachments: (editingExpert.attachments||[]).filter((_, j) => j !== i) }); }}>Remove</button>
                  </div>
                ))}
                <input type="file" accept="audio/*,image/*,application/pdf,.txt,.md,.doc,.docx" multiple onChange={async ev => {
                  const files = Array.from(ev.target.files || []);
                  if (!files.length) return;
                  const expertId = editingExpert.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
                  setUploading(true);
                  const newAtts = [];
                  for (const f of files) {
                    const r = await uploadExpertFile(expertId, f);
                    if (r) newAtts.push(r);
                  }
                  setUploading(false);
                  setEditingExpert(prev => ({ ...prev, id: expertId, attachments: [...(prev.attachments||[]), ...newAtts] }));
                  ev.target.value = "";
                }} style={{ fontSize: 12, marginTop: 6 }} />
                {uploading && <div style={{ fontSize: 11, color: "#6366f1", marginTop: 6 }}>Uploading…</div>}
              </div>
            </div>
            <div className="modal-foot">
              {editingExpert.id && (<button className="btn btn-outline" style={{ marginRight: "auto", color: "#dc2626", borderColor: "#fecaca" }} onClick={async () => { if (confirm("Delete this expert and all attachments?")) { await deleteExpertById(editingExpert.id); setEditingExpert(null); setOpenExpert(null); } }}>Delete</button>)}
              <button className="btn btn-outline" onClick={() => setEditingExpert(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={async () => { const saved = await saveExpert(editingExpert); setEditingExpert(null); setOpenExpert(saved); }}>Save</button>
            </div>
          </div>
        </div>
      )}
      {active && (
        <div className="panel">
          <div className="panel-header">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>§{active.section.id} · {active.section.title}</div>
                <div style={{ fontWeight: 700, fontSize: 14, lineHeight: 1.4 }}>{active.item.text}</div>
              </div>
              <button onClick={closePanel} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 22, cursor: "pointer", lineHeight: 1, flexShrink: 0, marginTop: 2 }}>\u00d7</button>
            </div>
            <div style={{ marginTop: 8 }}>
              <span className={`chip ${TYPE[active.item.type].chip}`}>{TYPE[active.item.type].label}</span>
            </div>
          </div>
          <div className="panel-body">
            <div className="desc-box">
              <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>What this needs to cover</div>
              <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{active.item.description}</p>
            </div>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Answer these \u2014 then copy for Claude</div>
            {active.item.questions.map((q, i) => (
              <div key={i} style={{ marginBottom: 16 }}>
                <div className="q-label">
                  <span className="q-num">{i + 1}</span>
                  <span>{q}</span>
                </div>
                <textarea className="answer" rows={3}
                  value={getAns(active.section.id, active.item.text, i)}
                  onChange={e => setAns(active.section.id, active.item.text, i, e.target.value)}
                  placeholder="Type your answer here..." />
              </div>
            ))}
          </div>
          <div className="panel-footer">
            <button className={`btn ${copied ? "btn-success" : "btn-primary"}`} style={{ width: "100%" }} onClick={copyForClaude}>
              {copied ? "\u2713 Copied \u2014 paste it into the chat!" : "\u{1F4CB} Copy Q&A for Claude"}
            </button>
            <button className="btn btn-outline" style={{ width: "100%" }}
              onClick={() => toggleCheck(active.section.id, active.item.text)}>
              {checked[key(active.section.id, active.item.text)] ? "\u2713 Marked as complete" : "Mark as complete"}
            </button>
            <p style={{ fontSize: 11, color: "#9ca3af", textAlign: "center" }}>
              Fill in your answers, copy, then paste into the chat for Claude to generate the content.
            </p>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
