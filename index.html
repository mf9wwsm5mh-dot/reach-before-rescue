const { useState, useCallback, useRef } = React;

const SECTIONS = [
  {
    id: 1, title: "Executive Summary", icon: "📋",
    desc: "One-page distillation — written last, placed first. Every word must earn its place.",
    items: [
      { text: "Problem statement (2–3 sentences)", type: "develop", description: "The hook. A razor-sharp articulation of why NZ's current SAR system is inadequate and what is at stake. This is the first thing a minister or senior official reads — it must create immediate urgency and emotional resonance without overstating.", questions: ["In one sentence, what is the single biggest failure of NZ's current SAR system?", "What is the human cost of this failure — lives lost, delayed rescues, critical injuries?", "What opportunity is currently being missed that drones could address?"] },
      { text: "Proposed solution overview", type: "develop", description: "A concise, plain-language description of the drone-assisted SAR system — what it does, how it works, and why it is the right solution. Must be understood by a non-technical reader in under 60 seconds. No jargon.", questions: ["What are the two or three core functions of the proposed drone system (e.g. detection, aid delivery, comms relay)?", "How does the system work alongside existing SAR teams rather than replacing them?", "What makes this approach uniquely suited to New Zealand's terrain and conditions?"] },
      { text: "Key evidence / POD improvement stat", type: "research", description: "The single most compelling data point in the entire proposal — the headline number that proves this works. Probability of Detection (POD) improvement or time-to-rescue reduction. This stat will be quoted in every meeting, so it must be bulletproof.", questions: ["Do you have any existing POD improvement data from simulations, field tests, or international programs?", "What is the estimated or targeted POD improvement that drone-assisted SAR delivers?", "What is the source of this data — modelled, field-tested, or drawn from international precedents?"] },
      { text: "Funding ask and expected impact", type: "develop", description: "Clear, specific statement of how much funding is requested, what it will be used for, and what measurable outcomes the government will see in return. Vague asks get rejected — specificity signals credibility.", questions: ["What is the approximate total funding amount being requested?", "What will the funding be used for at a high level (hardware, pilot program, certification, personnel)?", "What specific, measurable outcomes will the government see within the first 12–24 months?"] }
    ]
  },
  {
    id: 2, title: "The Problem", icon: "⚠️",
    desc: "Establish urgency. Decision-makers must feel the gap before they'll fund the solution.",
    items: [
      { text: "NZ SAR incident statistics (frequency, fatalities, outcomes)", type: "research", description: "Hard data establishing the scale and urgency of the problem. Decision-makers need numbers — how often SAR is activated, how many lives are at risk, and how often outcomes are preventably poor. Without this, the problem feels abstract.", questions: ["What is the approximate annual number of SAR activations in NZ (overall and in high-risk regions)?", "How many fatalities or critical injuries occur per year in SAR-relevant incidents?", "Are there specific regions or activity types (tramping, alpine, water) that dominate the statistics?"] },
      { text: "Cost of helicopter deployments per mission", type: "research", description: "Establishes the economic baseline that drones will be compared against throughout the proposal. This figure is the anchor of the economic case and must be sourced from official NZ data — not estimates.", questions: ["What is the per-hour or per-mission cost of helicopter SAR operations in NZ?", "How many helicopter SAR hours are deployed annually across NZ?", "Are there specific regional cost figures available (e.g. Queenstown / Otago SAR operations)?"] },
      { text: "Documented cases where faster detection could have saved lives", type: "research", description: "Narrative evidence — real incidents that put a human face on the problem. A single compelling case study is often more persuasive to policymakers than a page of statistics. Must be handled with sensitivity.", questions: ["Are there specific NZ SAR incidents where delayed detection led to a fatality or serious harm?", "What is the typical delay between a person going missing and the first aerial search arriving on scene?", "Are there coroner's reports, official reviews, or media-documented incidents that highlight detection delays?"] },
      { text: "Weather/terrain limitations on current SAR operations", type: "research", description: "Documents the physical constraints that ground or delay helicopter operations — the exact conditions where drones provide a clear, demonstrable advantage. This is where the 'force multiplier' argument begins.", questions: ["What specific weather conditions typically prevent or delay helicopter SAR in NZ mountain regions?", "What terrain types create blind spots or access difficulties for aerial SAR (valleys, dense bush, steep faces)?", "How frequently are SAR operations delayed due to weather in high-priority regions like Queenstown or the Southern Alps?"] },
      { text: "Average response time benchmarks for NZ SAR", type: "research", description: "The current baseline response time — the central metric drones can improve. This is a critical comparison point throughout the proposal and must be sourced from reliable NZ data rather than assumed.", questions: ["What is the typical time from emergency call to first aerial search unit on scene in NZ?", "How does response time vary by region (urban vs. remote vs. alpine)?", "What is the critical survival window — the timeframe within which detection dramatically improves outcomes for subjects in distress?"] },
      { text: "Gap analysis: what helicopters and ground teams cannot do", type: "develop", description: "A structured analysis of capability gaps that positions drones as the logical complement. Must be framed carefully — it is not a criticism of existing SAR teams, but an honest assessment of physical and operational limits.", questions: ["What specific tasks can drones perform that helicopters and ground teams physically cannot?", "What operational scenarios most clearly expose the limitations of current SAR methods?", "How do drones fill these gaps without disrupting or undermining existing operations?"] }
    ]
  },
  {
    id: 3, title: "The Solution — Drone-Assisted SAR", icon: "🚁",

    items: [
      { text: "System overview: aerial detection + micro-aid delivery", type: "develop", description: "The technical heart of the proposal explained in plain language. A non-technical minister must be able to explain this system to a colleague after reading this section.", questions: ["What type of drone platform is envisioned (fixed-wing, multi-rotor, hybrid) and why?", "What are the two core functions — detection and delivery — and how do they work together in a mission?", "What does a successful drone SAR deployment look like from start to finish in plain terms?"] },
      { text: "RGB anomaly detection explanation (non-technical language)", type: "develop", description: "A plain-English explanation of how the drone identifies a missing person using colour and visual anomaly detection. Essential for non-technical decision-makers. Avoid all technical jargon here.", questions: ["How does RGB anomaly detection work in simple, everyday terms a non-technical person would understand?", "What visual signatures does the system look for — clothing colour, contrast against terrain, movement?", "What are the realistic detection range, accuracy, and false-positive parameters?"] },
      { text: "Micro-aid drop vs tether delivery — comparison and rationale", type: "develop", description: "A clear comparison of the two delivery mechanisms with a recommendation. Decision-makers want to see that options have been evaluated — not just one approach assumed.", questions: ["What are the key practical differences between drop delivery and tether delivery in a SAR scenario?", "Which scenarios favour drop delivery vs tether (terrain, wind, subject condition)?", "What is your recommended primary delivery mechanism and why?"] },
      { text: "How drones complement (not replace) existing SAR operations", type: "develop", description: "Critical framing — this proposal must not be perceived as threatening existing SAR organisations or staff. LandSAR and NZ Police must see this as additive, not competitive.", questions: ["At what stage of a SAR mission would drones typically be deployed?", "How do drone operators coordinate with ground team leaders and helicopter crews during a mission?", "What decisions remain exclusively with human SAR coordinators?"] },
      { text: "Diagram: drone integration into SAR workflow", type: "develop", description: "A visual representation of how a drone-assisted SAR mission unfolds from activation to resolution. Likely the most referenced element in any presentation — clarity is paramount.", questions: ["What are the key sequential stages of a drone-assisted SAR mission from initial call to stand-down?", "Who is responsible at each stage — NZ Police, LandSAR, drone operator?", "What triggers the transition from drone search to ground team deployment or helicopter extraction?"] }
    ]
  },
  {
    id: 4, title: "Technical Validation", icon: "🔬",
    desc: "Evidence that the technology works under real SAR conditions. Scrutiny from technical reviewers will be high.",
    items: [
      { text: "Drone hardware specifications (range, payload, weather tolerance)", type: "research", description: "The technical specification of the proposed drone platform. Funders and technical reviewers will want to see a real, capable system — not a vague 'drone concept'.", questions: ["What drone platform or type is being proposed — is there a specific model or class in mind?", "What are the key operational parameters: range, endurance, payload capacity, max altitude?", "What wind speed, temperature, and precipitation conditions can the system reliably operate in?"] },
      { text: "Probability of Detection (POD) modelling data", type: "research", description: "The technical backbone of the entire proposal. POD is the standard SAR performance metric — improving it is the core value proposition. Data must be sourced, modelled, or clearly drawn from comparable international systems.", questions: ["What is the baseline POD for standard ground and helicopter SAR in terrain comparable to NZ's environments?", "What POD improvement does drone-assisted SAR achieve based on modelling, simulation, or international field data?", "What methodology was used to calculate or estimate the POD improvement figure?"] },
      { text: "Simulated deployment scenarios and outcomes", type: "develop", description: "Structured simulation of real SAR scenarios demonstrating system performance — used to validate the concept where live field data is limited. Scenarios must reflect genuine NZ SAR conditions.", questions: ["What specific SAR scenarios have been or will be simulated (e.g. lost tramper, alpine fall, night search)?", "What assumptions underpin each scenario — terrain type, weather, subject condition, search area size?", "What were or are the expected outcomes in terms of detection time, area covered, and POD improvement?"] },
      { text: "Field test results (if available)", type: "research", description: "Real-world test data is the gold standard for credibility. Even a small-scale field test dramatically strengthens the proposal. If none exist yet, present a clear field test plan.", questions: ["Have any field tests, exercises, or drone SAR demonstrations been conducted in NZ or comparable environments?", "If yes, what were the key findings, metrics, and lessons learned?", "If no field tests exist yet, what is the plan and timeline for conducting them?"] },
      { text: "Performance in alpine / high-wind environments", type: "research", description: "Specific validation of system performance in NZ's most challenging SAR environments — Southern Alps, Fiordland, Queenstown basin. NZ-specific or comparable alpine performance data is required.", questions: ["What wind speed limits apply to the proposed drone platform in operational conditions?", "How does performance change in cold temperatures and precipitation?", "Are there documented results from comparable alpine environments where similar systems have been tested?"] },
      { text: "Comparison of drone detection vs ground team detection rates", type: "research", description: "A direct, quantified comparison establishing the detection efficiency advantage of drones over traditional ground search — the clearest and most persuasive quantitative argument in the proposal.", questions: ["What area can a drone cover per hour vs a standard ground search team in open alpine terrain and dense bush?", "What is the relative detection rate across different terrain types?", "How does drone detection performance change at night, in rain, or in reduced visibility?"] }
    ]
  },
  {
    id: 5, title: "International Precedents", icon: "🌏",
    desc: "Governments fund things that have worked elsewhere. This section removes perceived risk.",
    items: [
      { text: "Australian drone SAR deployments and outcomes", type: "research", description: "Australia is the closest comparable context — shared terrain types, common law jurisdiction, similar rescue culture. Australian precedents carry particular weight with NZ decision-makers.", questions: ["What documented Australian drone SAR programs or significant deployments are you aware of?", "What outcomes — lives saved, detection time reduced, cost saved — have been documented?", "What regulatory framework governs drone SAR in Australia vs NZ's CAA Part 102 pathway?"] },
      { text: "European alpine drone SAR programs (Switzerland, Austria)", type: "research", description: "The Swiss and Austrian Alps represent the global benchmark for drone-assisted mountain rescue — terrain directly comparable to NZ. Programs from these countries carry strong academic and operational credibility.", questions: ["What specific programs or organisations are operating drone SAR in Switzerland and Austria?", "What performance metrics — detection rates, response times, POD improvements — have been published?", "What can NZ specifically learn from their implementation model, funding approach, or regulatory pathway?"] },
      { text: "UK Coast Guard / RNLI drone integration", type: "research", description: "Maritime and coastal SAR drone integration in the UK provides one of the best-documented, government-supported precedents for institutional adoption.", questions: ["How have UK Coast Guard and RNLI integrated drones into their SAR operations?", "What regulatory pathway did UK maritime SAR operators follow to gain approval?", "What outcomes have been formally documented?"] },
      { text: "Quantified outcomes: lives saved, time reduced, cost saved", type: "research", description: "Aggregated headline statistics from international drone SAR programs — distilled into the three or four most powerful numbers that will be repeated in every stakeholder conversation.", questions: ["What are the strongest, most credible quantified outcomes from international drone SAR programs?", "What is the documented average reduction in time-to-detection where drones have been deployed?", "What cost savings relative to helicopter-only operations have been formally documented and published?"] },
      { text: "Lessons learned from international programs", type: "research", description: "Honest analysis of what has worked and what has failed internationally — demonstrates that the NZ proposal is informed, realistic, and not repeating known mistakes.", questions: ["What are the most common implementation challenges in international drone SAR programs?", "What specific mistakes have other programs made that NZ's proposal can explicitly address?", "What success factors appear consistently across the most effective international programs?"] }
    ]

  {
    id: 6, title: "Regulatory Pathway", icon: "📜",
    desc: "A credible route through NZ's regulatory framework. Funders will not back an uncertain regulatory path.",
    items: [
      { text: "Current CAA Part 101 rules applicable to SAR drones", type: "research", description: "The baseline regulatory framework for drone operations in NZ — the starting point for all compliance planning. Decision-makers need to understand what is already permitted before they can appreciate what Part 102 adds.", questions: ["What specific Part 101 rules apply to SAR drone operations (BVLOS, altitude, weight class)?", "What are the key limitations of Part 101 that would prevent full SAR deployment under that framework alone?", "What preliminary SAR operations could proceed under Part 101 while Part 102 is being pursued?"] },
      { text: "Part 102 certification requirements and process", type: "research", description: "The advanced certification pathway required for complex drone operations in NZ — the regulatory target for a national SAR program. Must be described accurately; errors here undermine credibility immediately.", questions: ["What are the core technical and operational requirements for obtaining CAA Part 102 certification?", "How long does the Part 102 certification process typically take from application to approval?", "Which organisations currently hold Part 102 certification in NZ relevant to SAR or emergency operations?"] },
      { text: "Timeline and milestones for regulatory approval", type: "develop", description: "A realistic, phased timeline from current regulatory status to full operational certification. Funders want to know implementation is planned and achievable — not that the team will 'figure it out later'.", questions: ["What is the realistic timeline from proposal approval to achieving full Part 102 operational certification?", "What are the key regulatory milestones and decision points along the pathway?", "What early-stage SAR operations can commence under Part 101 while full certification is being pursued?"] },
      { text: "Airspace conflict mitigation strategy", type: "develop", description: "A clear plan for managing drone operations safely alongside helicopters, fixed-wing aircraft, and other SAR assets in shared airspace — scrutinised by the CAA and NZ Police.", questions: ["How will drone operations be deconflicted with helicopter SAR missions in the same search area?", "What communication protocols will drone operators use with ATC and other aircraft during SAR operations?", "What are the defined separation procedures if a drone and helicopter are simultaneously operating in proximity?"] },
      { text: "Failure scenario risk mitigation (drone loss, signal failure)", type: "develop", description: "Documented procedures for managing drone failures during active SAR operations — essential for regulatory approval and stakeholder confidence. Drone failures must not create new hazards.", questions: ["What happens operationally if a drone loses signal or experiences mechanical failure mid-mission?", "How does a drone system failure affect the broader SAR operation?", "What redundancy systems (return-to-home, backup comms, geofencing) are built into the proposed platform?"] },
      { text: "Ethical considerations (privacy, liability)", type: "develop", description: "A structured analysis of the ethical dimensions of drone SAR — around surveillance, data collection, and liability. NZ's Privacy Act and public sensitivity make this a necessary section.", questions: ["What image and video data is collected by SAR drones and how will it be stored, accessed, and deleted?", "What are the privacy implications of deploying aerial surveillance in recreational and residential areas during SAR?", "Who bears legal liability if a drone failure directly contributes to a negative SAR outcome?"] }
    ]

  {

    desc: "The financial justification for public investment. Every figure must be sourced and defensible.",
    items: [
      { text: "Average cost per helicopter SAR mission in NZ", type: "research", description: "The baseline cost figure against which drone deployment will be compared. Must be sourced from official NZ Police, NZSAR, or government budget data — not industry estimates. This anchors the entire economic argument.", questions: ["What is the per-hour operational cost of SAR helicopter missions in NZ (crew, fuel, maintenance, amortisation)?", "What is the average mission duration, giving a total average cost per deployment?", "Are there significant regional cost variations — e.g. between Queenstown, Wellington, and the West Coast?"] },
      { text: "Estimated cost per drone SAR deployment", type: "research", description: "The fully-loaded cost of deploying a drone SAR unit — hardware amortisation, operator costs, maintenance, compliance, and overhead. Must be realistic and comprehensive; underestimating creates credibility problems.", questions: ["What is the estimated capital cost of a complete SAR drone unit (platform, sensors, ground station, spares)?", "What are the per-mission variable operating costs (operator time, battery/fuel, consumables, maintenance)?", "What is the expected operational lifespan before major overhaul or replacement?"] },
      { text: "Cost-benefit analysis model", type: "develop", description: "A structured financial model comparing drone deployment against helicopter deployment across a realistic distribution of SAR scenario types and frequencies. One of the most scrutinised sections of any government proposal.", questions: ["How many SAR missions per year in NZ would realistically be candidates for drone deployment?", "What proportion of helicopter deployment time could realistically be reduced through drone integration?", "What is the total projected annual cost saving if drones are integrated at the proposed scale?"] },
      { text: "ROI projections for government investment", type: "develop", description: "A forward-looking model showing when government investment breaks even and what the long-term return looks like — in financial and human terms. Must account for non-financial value too.", questions: ["What is the total investment required for the proposed national drone SAR program over three to five years?", "Over what timeframe does the investment pay back through operational cost savings?", "How do you account for and communicate non-financial returns such as lives saved and faster rescues?"] },
      { text: "Scalability cost model (per region rollout)", type: "develop", description: "A cost model showing how the program scales from pilot to national coverage — demonstrating planning maturity and giving funders confidence that expansion is affordable and structured.", questions: ["How many NZ regions would be covered in a full national rollout and in what sequence?", "What is the incremental cost of adding each new region?", "Are there meaningful economies of scale in procurement, training, or maintenance at scale?"] },
      { text: "Long-term maintenance and operational cost estimates", type: "research", description: "Multi-year cost projections for sustaining the program — hardware refresh cycles, training, regulatory compliance, and staffing. Funders need to understand ongoing commitment, not just startup costs.", questions: ["What are the projected annual maintenance and operational costs for a regional drone SAR fleet?", "What is the hardware refresh cycle — how often does equipment need to be replaced or upgraded?", "What staffing model is required to sustain ongoing operations?"] }
    ]
  },
  {
    id: 8, title: "Stakeholder Alignment", icon: "🤝",
    desc: "Governments rarely fund proposals that surprise the agencies who'd implement them. Demonstrate engagement.",
    items: [
      { text: "LandSAR organisational structure and decision-makers", type: "research", description: "Understanding who leads LandSAR NZ, how decisions are made, and who the key influencers are for technology adoption. A proposal demonstrating deep knowledge of the organisation is treated as significantly more credible.", questions: ["Who are the key decision-makers and senior leaders within LandSAR NZ at a national level?", "How is LandSAR structured — national vs. regional, volunteer vs. paid, and how are technology decisions made?", "What is LandSAR's current awareness of or position on drone-assisted SAR operations?"] },
      { text: "NZ Police SAR unit — key contacts and operational priorities", type: "research", description: "NZ Police coordinate all national SAR operations. Understanding their structure, current priorities, and decision-making process for adopting new technology is essential.", questions: ["Which NZ Police unit or command has primary responsibility for SAR coordination?", "Who are the key operational contacts within NZ Police relevant to SAR technology and capability development?", "What are NZ Police's current stated priorities for SAR — speed, cost, coverage, technology?"] },
      { text: "CAA engagement / pre-consultation notes", type: "research", description: "Early, documented engagement with the Civil Aviation Authority signals regulatory seriousness. Even a preliminary conversation can be cited as evidence of proactive compliance planning.", questions: ["Has there been any formal or informal engagement with the CAA regarding drone SAR operations?", "What was the CAA's initial response, feedback, or guidance?", "Who at the CAA is the appropriate contact for SAR-related Part 102 certification discussions?"] },
      { text: "Consultation strategy for gaining stakeholder buy-in", type: "develop", description: "A structured approach to engaging SAR organisations, NZ Police, regulators, and government — ensuring the proposal has broad support before it reaches Parliament.", questions: ["What is the preferred sequence of stakeholder engagement — who needs to be consulted first and why?", "What are the key objections each major stakeholder group (LandSAR, NZ Police, CAA, Treasury) is likely to raise?", "What does a successful outcome look like from each stakeholder's perspective?"] },
      { text: "Letters of support or expressions of interest (if obtainable)", type: "develop", description: "Formal or informal written support from SAR organisations, regional councils, or industry bodies dramatically increases proposal credibility. Even a cautiously worded expression of interest is valuable.", questions: ["Which organisations or individuals would be most willing to provide a letter of support or expression of interest?", "What would each organisation need to see or be assured of before endorsing the proposal?", "Who is the right person to approach within each organisation?"] }

function App() {
  const load = (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
  const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

  const [page, setPage] = useState("tracker");
  const [filter, setFilter] = useState("all");
  const [expanded, setExpanded] = useState(() => load("rbr_expanded", SECTIONS.map(s => s.id)));
  const [checked, setChecked] = useState(() => load("rbr_checked", {}));
  const [answers, setAnswers] = useState(() => load("rbr_answers", {}));
  const [active, setActive] = useState(null);
  const [copied, setCopied] = useState(false);

  const persistChecked = (val) => { setChecked(val); save("rbr_checked", val); };
  const persistAnswers = (val) => { setAnswers(val); save("rbr_answers", val); };
  const persistExpanded = (val) => { setExpanded(val); save("rbr_expanded", val); };

  const allItems = SECTIONS.flatMap(s => s.items.map(i => ({ ...i, sid: s.id })));
  const total = allItems.length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  const researchTotal = allItems.filter(i => i.type === "research").length;
  const developTotal = allItems.filter(i => i.type === "develop").length;
  const researchDone = allItems.filter(i => i.type === "research" && checked[i.sid + "__" + i.text]).length;
  const developDone = allItems.filter(i => i.type === "develop" && checked[i.sid + "__" + i.text]).length;

  const key = (sid, text) => sid + "__" + text;
  const akey = (sid, text, qi) => sid + "__" + text + "__q" + qi;
  const getAns = (sid, text, qi) => answers[akey(sid, text, qi)] || "";
  const setAns = (sid, text, qi, val) => { const next = { ...answers, [akey(sid, text, qi)]: val }; persistAnswers(next); };

  const toggleSec = id => persistExpanded(expanded.includes(id) ? expanded.filter(x => x !== id) : [...expanded, id]);

  const openPanel = (section, item) => { setActive({ section, item }); setCopied(false); };
  const closePanel = () => setActive(null);

  const copyForClaude = () => {
    const { section, item } = active;
    const lines = [
      "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
      "REACH BEFORE RESCUE — ITEM WORKFLOW",
      "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
      "",
      "Section: " + section.title,
      "Item: " + item.text,
      "",
      "WHAT THIS NEEDS TO COVER:",
      item.description,
      "",
      "MY ANSWERS:",
      ...item.questions.flatMap((q, i) => ["", "Q" + (i+1) + ": " + q, "A: " + (getAns(section.id, item.text, i) || "(not yet answered)")]),
      "",
      "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
      'Using the context above, please write a comprehensive, government-grade "' + item.text + '" for the Reach Before Rescue drone-assisted SAR proposal targeting NZ Parliament. Make it credible, specific, and persuasive.'
    ];
    navigator.clipboard.writeText(lines.join("\n")).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 3000);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = lines.join("\n");
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 3000);
    });
  };

  const filteredSections = SECTIONS.map(s => ({
    ...s,
    items: s.items.filter(item => {
      if (filter === "completed") return checked[key(s.id, item.text)];
      if (filter === "all") return true;
      return item.type === filter;
    })
  })).filter(s => s.items.length > 0);

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", marginRight: active ? "420px" : 0, transition: "margin-right 0.25s" }}>
        {/* HEADER */}
        <div style={{ background: "#111827", color: "white", padding: "20px 24px" }}>
          <div style={{ maxWidth: 740, margin: "0 auto" }}>
            <div style={{ fontSize: 11, letterSpacing: 2, color: "#9ca3af", textTransform: "uppercase", marginBottom: 4 }}>Liger Impact Project · NZ Government Proposal</div>
            <h1 style={{ fontSize: 24, fontWeight: 800, letterSpacing: -0.5 }}>Reach Before Rescue</h1>
            <p style={{ color: "#9ca3af", fontSize: 13, marginTop: 2 }}>Drone-Assisted SAR · Proposal Development Tracker</p>
            <div style={{ marginTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#9ca3af", marginBottom: 4 }}>
                <span>{done} of {total} items completed</span>
                <span style={{ color: "white", fontWeight: 700 }}>{pct}%</span>
              </div>
              <div className="progress-bar"><div className="progress-fill" style={{ width: pct + "%" }} /></div>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
              <div className="stat-box"><div className="stat-num">{SECTIONS.length}</div><div className="stat-label">Sections</div></div>
              <div className="stat-box" style={{ background: "rgba(217,119,6,0.15)" }}><div className="stat-num" style={{ color: "#fcd34d" }}>{researchDone}/{researchTotal}</div><div className="stat-label" style={{ color: "#f59e0b" }}>Research</div></div>
              <div className="stat-box" style={{ background: "rgba(59,130,246,0.15)" }}><div className="stat-num" style={{ color: "#93c5fd" }}>{developDone}/{developTotal}</div><div className="stat-label" style={{ color: "#60a5fa" }}>Develop</div></div>
              <div className="stat-box" style={{ background: "rgba(34,197,94,0.15)" }}><div className="stat-num" style={{ color: "#86efac" }}>{done}/{total}</div><div className="stat-label" style={{ color: "#4ade80" }}>Complete</div></div>
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 16 }}>
              {[["tracker","📋 Tracker"],["sources","📚 Sources"]].map(([p, label]) => (
                <button key={p} onClick={() => { setPage(p); setActive(null); }}
                  style={{ padding: "6px 16px", borderRadius: 999, fontSize: 12, fontWeight: 700, cursor: "pointer", border: "1px solid", transition: "all 0.15s", background: page === p ? "white" : "transparent", color: page === p ? "#111827" : "rgba(255,255,255,0.6)", borderColor: page === p ? "white" : "rgba(255,255,255,0.2)" }}>
                  {label}
                </button>
              ))}
              {page === "sources" && (
                <span style={{ marginLeft: 8, fontSize: 11, color: "rgba(255,255,255,0.4)", alignSelf: "center" }}>
                  {SOURCES.reduce((a, c) => a + c.entries.length, 0)} sources across {SOURCES.length} categories
                </span>
              )}
            </div>
          </div>
        </div>

        {/* SOURCES PAGE */}
        {page === "sources" && (
          <div style={{ maxWidth: 740, margin: "0 auto", padding: "24px 20px 60px" }}>
            <div style={{ marginBottom: 20 }}>
              <h2 style={{ fontSize: 18, fontWeight: 800, color: "#111827" }}>Evidence & Sources</h2>
              <p style={{ fontSize: 13, color: "#6b7280", marginTop: 4 }}>All research sources for the Reach Before Rescue proposal. Claude adds to this automatically as research is conducted.</p>
            </div>
            {SOURCES.map((cat, ci) => (
              <div key={ci} style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: cat.color, flexShrink: 0 }} />
                  <h3 style={{ fontSize: 13, fontWeight: 800, color: "#111827", textTransform: "uppercase", letterSpacing: 0.5 }}>{cat.category}</h3>
                  <div style={{ flex: 1, height: 1, background: "#e5e7eb" }} />
                  <span style={{ fontSize: 11, color: "#9ca3af" }}>{cat.entries.length} source{cat.entries.length !== 1 ? "s" : ""}</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {cat.entries.map((src, si) => (
                    <div key={si} style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 10, padding: "14px 16px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", borderLeft: `3px solid ${cat.color}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 6 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          {src.url ? (
                            <a href={src.url} target="_blank" rel="noopener noreferrer"
                              style={{ fontSize: 14, fontWeight: 700, color: "#1d4ed8", textDecoration: "none", lineHeight: 1.4, display: "block" }}
                              onMouseOver={e => e.target.style.textDecoration = "underline"}
                              onMouseOut={e => e.target.style.textDecoration = "none"}>
                              {src.title}
                            </a>
                          ) : (
                            <span style={{ fontSize: 14, fontWeight: 700, color: "#6b7280", lineHeight: 1.4, display: "block" }}>{src.title}</span>
                          )}
                        </div>
                        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                          <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 999, background: "#f3f4f6", color: "#374151", fontWeight: 600, border: "1px solid #e5e7eb" }}>{src.type}</span>
                          <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 999, background: src.year === "TBC" ? "#fff7ed" : "#f0fdf4", color: src.year === "TBC" ? "#c2410c" : "#166534", fontWeight: 600, border: `1px solid ${src.year === "TBC" ? "#fed7aa" : "#bbf7d0"}` }}>{src.year}</span>
                        </div>
                      </div>
                      <p style={{ fontSize: 12, color: "#4b5563", lineHeight: 1.6, marginBottom: 8 }}>{src.summary}</p>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 10, color: "#9ca3af", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Relevance:</span>
                        <span style={{ fontSize: 11, color: src.relevance.startsWith("Critical") ? "#dc2626" : src.relevance.startsWith("High") ? "#16a34a" : "#d97706", fontWeight: 600 }}>{src.relevance}</span>
                      </div>
                      {!src.url && (
                        <div style={{ marginTop: 8, padding: "6px 10px", background: "#fff7ed", borderRadius: 6, fontSize: 11, color: "#c2410c", fontWeight: 600 }}>
                          ⚠ URL not yet sourced — needs research
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{ textAlign: "center", fontSize: 11, color: "#d1d5db", paddingTop: 16 }}>
              Reach Before Rescue · Sources Library · Updated as research is conducted
            </div>
          </div>
        )}

        {/* FILTER BAR */}
        {page === "tracker" && <div className="filter-bar" style={{display: page === "tracker" ? "" : "none"}}>
          <div style={{ maxWidth: 740, width: "100%", margin: "0 auto", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }} className="filter-inner">
            {[["all","All items"],["research","🔍 Research"],["develop","✏️ Develop"],["completed","✅ Done"]].map(([k, label]) => (
              <button key={k} className="btn-sm" onClick={() => setFilter(k)}
                style={{ background: filter === k ? "#111827" : "white", color: filter === k ? "white" : "#374151", borderColor: filter === k ? "#111827" : "#d1d5db" }}>
                {label}
              </button>
            ))}
            <div style={{ marginLeft: "auto", display: "flex", gap: 12 }}>
              <button onClick={() => persistExpanded(SECTIONS.map(s => s.id))} style={{ fontSize: 11, color: "#9ca3af", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>Expand all</button>
              <button onClick={() => persistExpanded([])} style={{ fontSize: 11, color: "#9ca3af", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>Collapse all</button>
            </div>
          </div>
        </div>}

        {/* SECTIONS */}
        {page === "tracker" && <div className="section-list">
          {filteredSections.map(section => {
            const isOpen = expanded.includes(section.id);
            const secDone = section.items.filter(i => checked[key(section.id, i.text)]).length;
            const allDone = secDone === section.items.length;
            return (
              <div key={section.id} className={`section-card${allDone ? " done" : ""}`}>
                <button className="section-header" onClick={() => toggleSec(section.id)}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                    <span style={{ fontSize: 20, flexShrink: 0 }}>{section.icon}</span>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span style={{ fontSize: 10, color: "#9ca3af", fontFamily: "monospace" }}>§{section.id}</span>
                        {allDone && <span style={{ fontSize: 10, color: "#16a34a", fontWeight: 700 }}>Complete ✓</span>}
                      </div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#111827" }}>{section.title}</div>
                      <div style={{ fontSize: 11, color: "#6b7280", marginTop: 1 }}>{section.desc}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0, marginLeft: 12 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: allDone ? "#16a34a" : "#9ca3af", fontVariantNumeric: "tabular-nums" }}>{secDone}/{section.items.length}</span>
                    <span style={{ color: "#d1d5db", fontSize: 11 }}>{isOpen ? "▲" : "▼"}</span>
                  </div>
                </button>
                {isOpen && section.items.map(item => {
                  const k = key(section.id, item.text);
                  const isChecked = !!checked[k];
                  const isActive = active?.item.text === item.text && active?.section.id === section.id;
                  const hasAns = item.questions.some((_, i) => getAns(section.id, item.text, i).trim());
                  return (
                    <div key={k} className={`item-row${isActive ? " active" : ""}${isChecked ? " done-item" : ""}`} onClick={() => openPanel(section, item)}>
                      <input type="checkbox" checked={isChecked}
                        onChange={e => { e.stopPropagation(); persistChecked({ ...checked, [k]: !checked[k] }); }}
                        onClick={e => e.stopPropagation()} />
                      <span style={{ flex: 1, fontSize: 13, color: isChecked ? "#9ca3af" : "#1f2937", textDecoration: isChecked ? "line-through" : "none" }}>{item.text}</span>
                      {hasAns && !isChecked && <span style={{ fontSize: 10, color: "#6366f1", fontWeight: 600 }}>In progress</span>}
                      <span className={`chip ${TYPE[item.type].chip}`}>{TYPE[item.type].label}</span>
                      <span style={{ color: "#d1d5db", fontSize: 12 }}>›</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
          <div style={{ textAlign: "center", fontSize: 11, color: "#d1d5db", paddingTop: 16 }}>
            Reach Before Rescue · Liger Impact Project · NZ Government Proposal
          </div>
        </div>}
      </div>

      {/* WORK PANEL */}
      {active && (
        <div className="panel">
          <div className="panel-header">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>§{active.section.id} · {active.section.title}</div>
                <div style={{ fontWeight: 700, fontSize: 14, lineHeight: 1.4 }}>{active.item.text}</div>
              </div>
              <button onClick={closePanel} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 22, cursor: "pointer", lineHeight: 1, flexShrink: 0, marginTop: 2 }}>×</button>
            </div>
            <div style={{ marginTop: 8 }}>
              <span className={`chip ${TYPE[active.item.type].chip}`}>{TYPE[active.item.type].label}</span>
            </div>
          </div>

          <div className="panel-body">
            <div className="desc-box">
              <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>What this needs to cover</div>
              <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{active.item.description}</p>
            </div>

            <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Answer these — then copy for Claude</div>

            {active.item.questions.map((q, i) => (
              <div key={i} style={{ marginBottom: 16 }}>
                <div className="q-label">
                  <span className="q-num">{i + 1}</span>
                  <span>{q}</span>
                </div>
                <textarea className="answer" rows={3}
                  value={getAns(active.section.id, active.item.text, i)}
                  onChange={e => setAns(active.section.id, active.item.text, i, e.target.value)}
                  placeholder="Type your answer here..." />
              </div>
            ))}
          </div>

          <div className="panel-footer">
            <button className={`btn ${copied ? "btn-success" : "btn-primary"}`} style={{ width: "100%" }} onClick={copyForClaude}>
              {copied ? "✓ Copied — paste it into the chat!" : "📋 Copy Q&A for Claude"}
            </button>
            <button className="btn btn-outline" style={{ width: "100%" }}
              onClick={() => persistChecked({ ...checked, [key(active.section.id, active.item.text)]: !checked[key(active.section.id, active.item.text)] })}>
              {checked[key(active.section.id, active.item.text)] ? "✓ Marked as complete" : "Mark as complete"}
            </button>
            <p style={{ fontSize: 11, color: "#9ca3af", textAlign: "center" }}>
              Fill in your answers, copy, then paste into the chat for Claude to generate the content.
            </p>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
